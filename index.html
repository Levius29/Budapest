<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World + Snake</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  /* ── HELLO WORLD ── */
  .hello {
    text-align: center;
    margin-bottom: 60px;
  }
  .hello h1 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    background: linear-gradient(135deg, #58d68d, #3498db, #9b59b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    animation: fadeIn 1s ease;
  }
  .hello p {
    margin-top: 12px;
    color: #8b949e;
    font-size: 1.1rem;
    animation: fadeIn 1.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SNAKE GAME ── */
  .game-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 1.8s ease;
  }
  .game-section h2 {
    font-size: 1.6rem;
    color: #58d68d;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #scoreboard {
    display: flex;
    gap: 40px;
    font-size: 1rem;
    color: #8b949e;
  }
  #scoreboard span { color: #e6edf3; font-weight: 600; }

  canvas {
    border: 2px solid #238636;
    border-radius: 8px;
    background: #010409;
    display: block;
    image-rendering: pixelated;
    box-shadow: 0 0 30px rgba(35, 134, 54, 0.3);
  }

  .controls {
    color: #8b949e;
    font-size: 0.85rem;
    text-align: center;
    line-height: 1.8;
  }
  .controls kbd {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 0.8rem;
    color: #e6edf3;
  }

  #startBtn {
    padding: 10px 36px;
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  #startBtn:hover { background: #2ea043; }

  .message {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
  }
  .canvas-wrap { position: relative; }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(1,4,9,0.75);
    border-radius: 6px;
    font-size: 1.1rem;
  }
  #overlay.hidden { display: none; }
  #overlay .big { font-size: 1.8rem; font-weight: 700; color: #58d68d; }
  #overlay .sub { color: #8b949e; font-size: 0.9rem; }
</style>
</head>
<body>

  <!-- HELLO WORLD -->
  <section class="hello">
    <h1>Hello, World!</h1>
    <p>Welcome to the internet. Have a snake. 🐍</p>
  </section>

  <!-- SNAKE GAME -->
  <section class="game-section">
    <h2>Snake</h2>

    <div id="scoreboard">
      Score: <span id="score">0</span> &nbsp;|&nbsp; Best: <span id="best">0</span>
    </div>

    <div class="canvas-wrap">
      <canvas id="c" width="400" height="400"></canvas>
      <div id="overlay">
        <div class="big" id="overlayTitle">Snake</div>
        <div class="sub" id="overlaySub">Press Start or Space to play</div>
        <button id="startBtn">Start</button>
      </div>
    </div>

    <div class="controls">
      <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> &nbsp; or &nbsp;
      <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> &nbsp;|&nbsp;
      <kbd>Space</kbd> pause &nbsp;|&nbsp; <kbd>R</kbd> restart
    </div>
  </section>

<script>
(function() {
  const COLS = 20, ROWS = 20;
  const CELL = 20; // px  (400/20)
  const TICK = 130; // ms

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const overlay  = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub   = document.getElementById('overlaySub');
  const startBtn = document.getElementById('startBtn');

  let snake, dir, nextDir, food, score, best = 0, running = false, paused = false, raf, lastTick;

  function init() {
    snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
    dir = {x:1, y:0};
    nextDir = {x:1, y:0};
    score = 0;
    scoreEl.textContent = 0;
    spawnFood();
  }

  function spawnFood() {
    let pos;
    do {
      pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
    } while (snake.some(s => s.x===pos.x && s.y===pos.y));
    food = pos;
  }

  function step() {
    dir = nextDir;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // wall
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { gameOver(); return; }
    // self
    if (snake.some(s => s.x===head.x && s.y===head.y)) { gameOver(); return; }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > best) { best = score; bestEl.textContent = best; }
      spawnFood();
    } else {
      snake.pop();
    }
  }

  function draw() {
    ctx.fillStyle = '#010409';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // grid (subtle)
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let x=0; x<COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
    for (let y=0; y<ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }

    // food
    const fx = food.x*CELL + CELL/2, fy = food.y*CELL + CELL/2, fr = CELL/2 - 2;
    const gf = ctx.createRadialGradient(fx, fy, 1, fx, fy, fr);
    gf.addColorStop(0, '#ff6b6b');
    gf.addColorStop(1, '#c0392b');
    ctx.fillStyle = gf;
    ctx.beginPath();
    ctx.arc(fx, fy, fr, 0, Math.PI*2);
    ctx.fill();

    // snake
    snake.forEach((seg, i) => {
      const t = i / snake.length;
      const r = Math.round(88 - t*50), g = Math.round(214 - t*100), b = Math.round(141 - t*60);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      const margin = i === 0 ? 1 : 2;
      ctx.beginPath();
      ctx.roundRect(seg.x*CELL+margin, seg.y*CELL+margin, CELL-margin*2, CELL-margin*2, i===0?4:2);
      ctx.fill();

      // eyes on head
      if (i === 0) {
        ctx.fillStyle = '#010409';
        const ex = seg.x*CELL + (dir.x===0?5:dir.x>0?14:4);
        const ey = seg.y*CELL + (dir.y===0?5:dir.y>0?14:4);
        ctx.beginPath(); ctx.arc(ex, ey, 2, 0, Math.PI*2); ctx.fill();
        const ex2 = seg.x*CELL + (dir.x===0?15:dir.x>0?14:4);
        const ey2 = seg.y*CELL + (dir.y===0?5:dir.y>0?14:4);
        ctx.beginPath(); ctx.arc(ex2, ey2, 2, 0, Math.PI*2); ctx.fill();
      }
    });
  }

  function loop(ts) {
    if (!running || paused) return;
    if (!lastTick) lastTick = ts;
    if (ts - lastTick >= TICK) {
      step();
      lastTick = ts;
    }
    if (running) draw();
    raf = requestAnimationFrame(loop);
  }

  function start() {
    init();
    running = true;
    paused = false;
    overlay.classList.add('hidden');
    lastTick = null;
    raf = requestAnimationFrame(loop);
  }

  function gameOver() {
    running = false;
    cancelAnimationFrame(raf);
    overlayTitle.textContent = 'Game Over';
    overlaySub.textContent = `Score: ${score}`;
    startBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (!paused) { lastTick = null; raf = requestAnimationFrame(loop); }
  }

  // input
  const KEY_MAP = {
    ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
    W:{x:0,y:-1}, S:{x:0,y:1}, A:{x:-1,y:0}, D:{x:1,y:0},
  };

  document.addEventListener('keydown', e => {
    if (e.key === ' ') { e.preventDefault(); if (!running) start(); else togglePause(); return; }
    if (e.key === 'r' || e.key === 'R') { start(); return; }
    const d = KEY_MAP[e.key];
    if (!d) return;
    e.preventDefault();
    // prevent 180°
    if (d.x !== 0 && d.x === -dir.x) return;
    if (d.y !== 0 && d.y === -dir.y) return;
    nextDir = d;
  });

  startBtn.addEventListener('click', start);

  // initial draw (empty board preview)
  init();
  draw();
})();
</script>
</body>
</html>
